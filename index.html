<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PalaceWolf 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --gold: #f5c542; --orange: #e8813a; --pink: #ff6b9d; }

  body {
    min-height: 100vh; background: #0d0d0d;
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; padding: 40px 20px 60px;
    font-family: "Nunito", sans-serif; overflow-x: hidden; position: relative;
  }
  body::before {
    content: ""; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(232,129,58,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(245,197,66,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(255,107,157,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* === ELEMENTOS FLOTANTES === */
  .float-item {
    position: fixed; opacity: 0; pointer-events: none; z-index: 0;
    animation: fallItem linear infinite; user-select: none;
  }
  @keyframes fallItem {
    0%   { transform: translateY(-80px) rotate(0deg); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 0.7; }
    100% { transform: translateY(110vh) rotate(380deg); opacity: 0; }
  }

  /* === CONTAINER === */
  .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; }

  /* === AVATAR === */
  .avatar-wrap { position: relative; margin-bottom: 10px; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }
  .avatar-ring {
    width: 158px; height: 158px; border-radius: 50%; padding: 4px;
    background: conic-gradient(var(--gold) 0deg, var(--orange) 90deg, var(--pink) 180deg, var(--gold) 270deg, var(--orange) 360deg);
    animation: spinRing 6s linear infinite;
    box-shadow: 0 0 32px rgba(245,197,66,0.45), 0 0 64px rgba(232,129,58,0.2);
    position: relative; z-index: 2; overflow: hidden;
  }
  @keyframes spinRing { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }
  .avatar-ring img {
    width: 100%; height: 100%; border-radius: 50%;
    object-fit: cover; object-position: center top;
    display: block; border: 4px solid #0d0d0d;
  }
  .paw-orbit { position: absolute; font-size: 1.1rem; animation: orbitPaw 8s linear infinite; z-index: 1; }
  @keyframes orbitPaw {
    from { transform: rotate(0deg) translateX(90px) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(90px) rotate(-360deg); }
  }

  /* === TEXTO === */
  .name { font-family: "Fredoka One", cursive; font-size: 2rem; color: var(--gold); letter-spacing: 1px; text-shadow: 0 0 20px rgba(245,197,66,0.5); margin-top: 14px; }
  .tagline { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; }
  .paw-divider { display: flex; gap: 6px; margin: 18px 0 22px; font-size: 1.1rem; opacity: 0.6; }

  /* === LINKS === */
  .links { display: flex; flex-direction: column; gap: 14px; width: 100%; }
  .link-btn {
    display: flex; align-items: center; gap: 14px; text-decoration: none;
    border-radius: 18px; padding: 15px 22px; font-family: "Fredoka One", cursive;
    font-size: 1.1rem; letter-spacing: 0.5px; position: relative; overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease; border: 2px solid transparent; cursor: pointer;
  }
  .link-btn::before { content: ""; position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s; background: rgba(255,255,255,0.08); }
  .link-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
  .link-btn:hover::before { opacity: 1; }
  .link-btn:active { transform: scale(0.97); }
  .link-icon { width: 36px; height: 36px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .link-icon svg { width: 100%; height: 100%; }
  .link-text { flex: 1; text-align: left; }
  .link-arrow { font-size: 0.9rem; opacity: 0.6; transition: transform 0.2s; }
  .link-btn:hover .link-arrow { transform: translateX(4px); opacity: 1; }
  .btn-of { background: linear-gradient(135deg, #000f1a, #001f35); border-color: rgba(0,163,255,0.4); color: #00a3ff; box-shadow: 0 4px 20px rgba(0,163,255,0.2); }
  .btn-tiktok { background: linear-gradient(135deg, #0a0a0a, #1a1a1a); border-color: rgba(105,201,208,0.4); color: #fff; box-shadow: 0 4px 20px rgba(105,201,208,0.15); }
  .btn-ig { background: linear-gradient(135deg, #1a0a1a, #2a0f1e); border-color: rgba(193,53,132,0.4); color: #f77737; box-shadow: 0 4px 20px rgba(193,53,132,0.15); }
  .btn-x { background: linear-gradient(135deg, #0a0a0a, #141414); border-color: rgba(255,255,255,0.25); color: #e7e7e7; box-shadow: 0 4px 20px rgba(255,255,255,0.06); }
  .footer { margin-top: 36px; color: rgba(255,255,255,0.2); font-size: 0.78rem; letter-spacing: 1.5px; text-transform: uppercase; }

  /* === MODAL 18+ === */
  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal-box { background: #111; border: 2px solid rgba(255,60,60,0.5); border-radius: 24px; padding: 36px 28px; max-width: 320px; width: 90%; text-align: center; box-shadow: 0 0 60px rgba(255,40,40,0.25); animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-icon { font-size: 3.5rem; margin-bottom: 12px; display: block; animation: pulse18 1.5s ease-in-out infinite; }
  @keyframes pulse18 { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
  .modal-title { font-family: "Fredoka One", cursive; font-size: 1.6rem; color: #ff4444; margin-bottom: 8px; text-shadow: 0 0 16px rgba(255,60,60,0.5); }
  .modal-text { color: rgba(255,255,255,0.65); font-size: 0.88rem; line-height: 1.6; margin-bottom: 24px; }
  .modal-text strong { color: rgba(255,255,255,0.9); }
  .modal-btns { display: flex; gap: 12px; }
  .btn-confirm { flex: 1; padding: 13px; border: none; border-radius: 14px; background: linear-gradient(135deg, #c0392b, #e74c3c); color: white; font-family: "Fredoka One", cursive; font-size: 1rem; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 16px rgba(231,76,60,0.35); }
  .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(231,76,60,0.5); }
  .btn-cancel { flex: 1; padding: 13px; border: 2px solid rgba(255,255,255,0.15); border-radius: 14px; background: transparent; color: rgba(255,255,255,0.55); font-family: "Fredoka One", cursive; font-size: 1rem; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .btn-cancel:hover { background: rgba(255,255,255,0.07); color: white; }
</style>
</head>
<body>

<script>
  // Huellitas y lobos cayendo
  const items = [
    { text: "🐾", weight: 10 },
    { text: "🐺", weight: 1 }
  ];
  const total = items.reduce((a,b) => a + b.weight, 0);
  for(let i = 0; i < 22; i++){
    const r = Math.random() * total;
    let acc = 0, chosen = items[0];
    for(const item of items){ acc += item.weight; if(r < acc){ chosen = item; break; } }
    const el = document.createElement("div");
    el.className = "float-item";
    el.textContent = chosen.text;
    el.style.left = Math.random()*100 + "vw";
    el.style.animationDuration = (8 + Math.random()*12) + "s";
    el.style.animationDelay = (Math.random()*15) + "s";
    el.style.fontSize = chosen.text === "🐺"
      ? (1.4 + Math.random()*0.8) + "rem"
      : (0.8 + Math.random()*1.1) + "rem";
    el.style.opacity = chosen.text === "🐺" ? "0.18" : "1";
    document.body.appendChild(el);
  }
</script>

      This link contains <strong>explicit 18+ content.</strong><br><br>
      By continuing, you confirm that you are <strong>18 years of age or older</strong> and agree to view adult content.
    </p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Go Back</button>
      <button class="btn-confirm" onclick="confirmAge()">I am 18+ ✓</button>
    </div>
  </div>
</div>
